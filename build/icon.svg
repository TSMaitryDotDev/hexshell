<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep void -->
  <rect width="512" height="512" rx="96" ry="96" fill="#000a06"/>

  <!-- Subtle inner border like the HUD frame -->
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80"
        fill="none" stroke="#7cffb2" stroke-opacity="0.20" stroke-width="2"/>

  <!-- Hex motif: 6-sided ring suggesting "hex" + a terminal cursor -->
  <g transform="translate(256 256)">
    <!-- outer hexagon -->
    <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75"
             fill="none" stroke="#7cffb2" stroke-width="6" stroke-linejoin="round"/>
    <!-- inner hexagon, dimmer -->
    <polygon points="0,-105 91,-52 91,52 0,105 -91,52 -91,-52"
             fill="none" stroke="#7cffb2" stroke-opacity="0.45" stroke-width="3"/>
    <!-- prompt chevron -->
    <polyline points="-46,-22 0,0 -46,22" fill="none"
              stroke="#7cffb2" stroke-width="14"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- cursor block -->
    <rect x="14" y="-12" width="40" height="24" fill="#7cffb2"/>
  </g>
</svg>
