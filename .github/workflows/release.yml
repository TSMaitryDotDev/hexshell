name: release

# Triggered manually OR on a tag push (vX.Y.Z). The two paths produce the
# same artifacts; the tag path also creates a draft GitHub Release with
# them attached.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  linux:
    name: Build linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          # arm64 cross-compile via QEMU is fragile for native modules; the
          # cleanest path is a real arm64 runner. GitHub now offers them in
          # the free tier for public repos.
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        # rpmbuild for .rpm, fakeroot/dpkg for .deb, libsecret for keytar
        # (Electron pulls it transitively). xz-utils for tar.xz, librsvg
        # for the icon, file for sanity checks.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm \
            fakeroot \
            dpkg-dev \
            xz-utils \
            librsvg2-bin \
            libsecret-1-dev \
            unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install dependencies
        run: bun install

      - name: Render app icon
        run: bun run icon

      - name: Build all Linux artifacts (${{ matrix.arch }})
        env:
          # electron-builder uses these to pin the architecture per matrix
          # entry. Without them it would build for the runner's arch only.
          USE_HARD_LINKS: 'false'
        run: bun run dist:all -- --${{ matrix.arch }}

      - name: Generate checksums
        run: bun run checksums

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: hexshell-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.pacman
            dist/*.tar.xz
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine SHA256SUMS
        run: |
          set -e
          mkdir -p release
          # Move every artifact to release/ flat. Two SHA256SUMS files
          # arrive (one per arch); concatenate them.
          find artifacts -type f -name 'SHA256SUMS' -exec cat {} + \
            | sort -u > release/SHA256SUMS
          find artifacts -type f \
            ! -name 'SHA256SUMS' -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.tar.xz
            release/SHA256SUMS
